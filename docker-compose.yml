networks:
  projectx:
    driver: bridge

volumes:
  esdata01:
  mysql_data:
  minio_data:
  redis_data:

# ── RAGFlow services ────────────────────────────────────────

services:

  # Elasticsearch (vector + keyword store for RAGFlow)
  es01:
    image: elasticsearch:8.11.3
    platform: linux/amd64
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-projectx_elastic}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "1200:9200"
    networks:
      - projectx
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 -u elastic:${ELASTIC_PASSWORD:-projectx_elastic} | grep -q 'You Know, for Search'"]
      interval: 10s
      retries: 20
      timeout: 10s

  # MySQL (RAGFlow metadata)
  mysql:
    image: mysql:8.0.39
    platform: linux/amd64
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-projectx_root}
      - MYSQL_DATABASE=rag_flow
      - MYSQL_USER=ragflow
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-projectx_mysql}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "5455:3306"
    networks:
      - projectx
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ragflow", "--password=${MYSQL_PASSWORD:-projectx_mysql}"]
      interval: 10s
      retries: 20
      timeout: 5s

  # MinIO (object storage for RAGFlow documents)
  minio:
    image: quay.io/minio/minio:RELEASE.2023-12-20T01-00-02Z
    platform: linux/amd64
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=rag_flow
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-projectx_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - projectx
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 20
      timeout: 5s

  # Redis (task queue for RAGFlow)
  redis:
    image: redis:7.2.4
    platform: linux/amd64
    command: redis-server --requirepass ${REDIS_PASSWORD:-projectx_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - projectx
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-projectx_redis}", "ping"]
      interval: 10s
      retries: 10

  # RAGFlow main service (deepdoc backend + REST API)
  ragflow:
    image: infiniflow/ragflow:v0.24.0
    platform: linux/amd64
    command:
      - --enable-adminserver
    ports:
      - "80:80"       # RAGFlow Web UI
      - "9380:9380"   # RAGFlow REST API (used by Kotaemon integration)
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=ragflow
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-projectx_mysql}
      - MYSQL_NAME=rag_flow
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_USER=rag_flow
      - MINIO_PASSWORD=${MINIO_PASSWORD:-projectx_minio}
      - ES_HOST=es01
      - ES_PORT=9200
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-projectx_elastic}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-projectx_redis}
    depends_on:
      mysql:
        condition: service_healthy
      es01:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ragflow/docker/ragflow-logs:/ragflow/logs
    networks:
      - projectx
    restart: unless-stopped

  # ── Kotaemon (beautiful RAG UI) ──────────────────────────

  kotaemon:
    image: ghcr.io/cinnamon/kotaemon:latest
    platform: linux/amd64
    ports:
      - "7860:7860"   # Kotaemon Gradio UI
    environment:
      # RAGFlow connection
      - RAGFLOW_API_BASE=http://ragflow:9380
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - RAGFLOW_DATASET_ID=${RAGFLOW_DATASET_ID:-}
      # LLM providers (set what you use)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # Ollama (local models)
      - KH_OLLAMA_URL=${KH_OLLAMA_URL:-http://host.docker.internal:11434/v1/}
      # App settings
      - KH_ENABLE_FIRST_SETUP=true
      - KH_FEATURE_USER_MANAGEMENT=true
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      # Persistent app data
      - ./ktem_app_data:/app/ktem_app_data
      # Mount our RAGFlow integration adapter into the container
      - ./ragflow_integration:/app/ragflow_integration
      # Mount our patched flowsettings (adds RAGFlowIndex to KH_INDICES)
      - ./flowsettings_patched.py:/app/flowsettings.py
    depends_on:
      - ragflow
    networks:
      - projectx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
